# Autonomyx Fast SaaS Toolkit — Docker Compose Stack
# Profiles: essential (always), core (default), ops (default), growth (opt-in)
# Usage: docker compose --profile core --profile ops up -d

x-common: &common
  restart: unless-stopped
  networks:
    - saas-internal

services:
  # ============================================================
  # ESSENTIAL — Always installed
  # ============================================================

  postgres:
    <<: *common
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-saas}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    <<: *common
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - saas-internal
      - saas-public
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================
  # CORE — Auth, Billing, Storage
  # ============================================================

  logto:
    <<: *common
    image: svhd/logto:latest
    profiles: ["core"]
    environment:
      TRUST_PROXY_HEADER: "1"
      DB_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/logto
      ENDPOINT: https://auth.${DOMAIN}
      ADMIN_ENDPOINT: https://auth-admin.${DOMAIN}
    ports:
      - "${LOGTO_PORT:-3301}:3001"
      - "${LOGTO_ADMIN_PORT:-3302}:3002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  lago-api:
    <<: *common
    image: getlago/api:latest
    profiles: ["core"]
    environment:
      LAGO_API_URL: https://billing-api.${DOMAIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/lago
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RAILS_ENV: production
      SECRET_KEY_BASE: ${LAGO_SECRET_KEY}
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
      ENCRYPTION_PRIMARY_KEY: ${LAGO_ENCRYPTION_PRIMARY_KEY}
      ENCRYPTION_DETERMINISTIC_KEY: ${LAGO_ENCRYPTION_DETERMINISTIC_KEY}
      ENCRYPTION_KEY_DERIVATION_SALT: ${LAGO_ENCRYPTION_KEY_SALT}
    volumes:
      - lago-data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  lago-front:
    <<: *common
    image: getlago/front:latest
    profiles: ["core"]
    environment:
      API_URL: https://billing-api.${DOMAIN}
      APP_ENV: production
      LAGO_DISABLE_SIGNUP: "false"
    depends_on:
      lago-api:
        condition: service_healthy

  rustfs:
    <<: *common
    image: rustfs/rustfs:latest
    profiles: ["core"]
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - rustfs-data:/data
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/ | grep -qE '^(200|403)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  saas-api:
    <<: *common
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    profiles: ["core"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/saas
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LOGTO_ENDPOINT: https://auth.${DOMAIN}/oidc
      LOGTO_AUDIENCE: ${LOGTO_AUDIENCE:-}
      API_PORT: "4000"
      PLATFORM_API_KEY: ${PLATFORM_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # OPS — Error tracking, Uptime, Metrics
  # ============================================================

  glitchtip:
    <<: *common
    image: glitchtip/glitchtip:latest
    profiles: ["ops"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      PORT: "8000"
      EMAIL_URL: smtp://${SMTP_USER}:${SMTP_PASSWORD}@stalwart:25
      GLITCHTIP_DOMAIN: https://errors.${DOMAIN}
      DEFAULT_FROM_EMAIL: errors@${DOMAIN}
      CELERY_WORKER_AUTOSCALE: "1,3"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/_health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  glitchtip-worker:
    <<: *common
    image: glitchtip/glitchtip:latest
    profiles: ["ops"]
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  uptime-kuma:
    <<: *common
    image: louislam/uptime-kuma:latest
    profiles: ["ops"]
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/status-page/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    <<: *common
    image: prom/prometheus:latest
    profiles: ["ops"]
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  loki:
    <<: *common
    image: grafana/loki:latest
    profiles: ["ops"]
    volumes:
      - ./services/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    <<: *common
    image: grafana/grafana:latest
    profiles: ["ops"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitor.${DOMAIN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # GROWTH — Analytics, Email, Admin, Workflows
  # ============================================================

  matomo:
    <<: *common
    image: matomo:latest
    profiles: ["growth"]
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
      MATOMO_DATABASE_DBNAME: matomo
    volumes:
      - matomo-data:/var/www/html
    depends_on:
      matomo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  matomo-db:
    <<: *common
    image: mariadb:11
    profiles: ["growth"]
    environment:
      MARIADB_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - matomo-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mautic:
    <<: *common
    image: mautic/mautic:latest
    profiles: ["growth"]
    environment:
      MAUTIC_DB_HOST: postgres
      MAUTIC_DB_PORT: "5432"
      MAUTIC_DB_NAME: mautic
      MAUTIC_DB_USER: ${POSTGRES_USER:-saas}
      MAUTIC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAUTIC_ADMIN_EMAIL: ${ADMIN_EMAIL}
      MAUTIC_ADMIN_PASSWORD: ${MAUTIC_ADMIN_PASSWORD}
    volumes:
      - mautic-data:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/s/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  stalwart:
    <<: *common
    image: stalwartlabs/mail-server:latest
    profiles: ["growth"]
    volumes:
      - stalwart-data:/opt/stalwart-mail
    ports:
      - "25:25"
      - "587:587"
      - "993:993"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  nocodb:
    <<: *common
    image: nocodb/nocodb:latest
    profiles: ["growth"]
    environment:
      NC_DB: pg://postgres:5432?u=${POSTGRES_USER:-saas}&p=${POSTGRES_PASSWORD}&d=nocodb
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET}
    volumes:
      - nocodb-data:/usr/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  n8n:
    <<: *common
    image: n8nio/n8n:latest
    profiles: ["growth"]
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-saas}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: auto.${DOMAIN}
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://auto.${DOMAIN}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  appsmith:
    <<: *common
    image: appsmith/appsmith-ce:latest
    profiles: ["growth"]
    volumes:
      - appsmith-data:/appsmith-stacks
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/v1/users/me || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  docmost:
    <<: *common
    image: docmost/docmost:latest
    profiles: ["growth"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/docmost
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      APP_SECRET: ${DOCMOST_SECRET}
      APP_URL: https://docs.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # AI — LLM chat, visual workflows, local models, agent runner
  # ============================================================

  ollama:
    <<: *common
    image: ollama/ollama:latest
    profiles: ["ai"]
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment for GPU passthrough (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ | grep -q Ollama || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  langflow:
    <<: *common
    image: langflowai/langflow:latest
    profiles: ["ai"]
    environment:
      LANGFLOW_DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/langflow
      LANGFLOW_CONFIG_DIR: /app/langflow
      LANGFLOW_AUTO_LOGIN: ${LANGFLOW_AUTO_LOGIN:-true}
      LANGFLOW_SUPERUSER: ${LANGFLOW_SUPERUSER:-admin}
      LANGFLOW_SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD}
      LANGFLOW_SECRET_KEY: ${LANGFLOW_SECRET_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - langflow-data:/app/langflow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  librechat-mongodb:
    <<: *common
    image: mongo:8.0
    profiles: ["ai"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: librechat
      MONGO_INITDB_ROOT_PASSWORD: ${LIBRECHAT_MONGODB_PASSWORD}
    volumes:
      - librechat-mongodb-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" --quiet || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  librechat-meilisearch:
    <<: *common
    image: getmeili/meilisearch:v1.35.1
    profiles: ["ai"]
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - librechat-meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  librechat:
    <<: *common
    image: ghcr.io/danny-avila/librechat:latest
    profiles: ["ai"]
    environment:
      MONGO_URI: mongodb://librechat:${LIBRECHAT_MONGODB_PASSWORD}@librechat-mongodb:27017/LibreChat?authSource=admin
      MEILI_HOST: http://librechat-meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      CREDS_KEY: ${LIBRECHAT_CREDS_KEY}
      CREDS_IV: ${LIBRECHAT_CREDS_IV}
      JWT_SECRET: ${LIBRECHAT_JWT_SECRET}
      JWT_REFRESH_SECRET: ${LIBRECHAT_JWT_REFRESH_SECRET}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/4
      DOMAIN_CLIENT: https://chat.${DOMAIN}
      DOMAIN_SERVER: https://chat.${DOMAIN}
      OLLAMA_BASE_URL: http://ollama:11434
      # SMTP (use Stalwart internal or any external provider)
      EMAIL_SERVICE: custom
      EMAIL_HOST: ${SMTP_HOST:-stalwart}
      EMAIL_PORT: ${SMTP_PORT:-25}
      EMAIL_USERNAME: ${SMTP_USER:-noreply}
      EMAIL_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: noreply@${DOMAIN}
      EMAIL_FROM_NAME: ${APP_NAME:-SaaS Platform}
    volumes:
      - librechat-uploads:/app/uploads
      - librechat-logs:/app/logs
      - ./services/librechat/librechat.yaml:/app/librechat.yaml:ro
    depends_on:
      librechat-mongodb:
        condition: service_healthy
      librechat-meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  claude-agent:
    <<: *common
    build:
      context: ./services/claude-agent
      dockerfile: Dockerfile
    profiles: ["ai"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_AGENT_API_KEY: ${CLAUDE_AGENT_API_KEY}
      PORT: ${CLAUDE_AGENT_PORT:-3100}
    volumes:
      - claude-agent-workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  langfuse:
    <<: *common
    image: langfuse/langfuse:latest
    profiles: ["ai"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: https://observe.${DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET_KEY}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      # SMTP (use Stalwart internal or any external provider)
      SMTP_CONNECTION_URL: smtp://${SMTP_USER:-noreply}:${SMTP_PASSWORD:-}@${SMTP_HOST:-stalwart}:${SMTP_PORT:-25}
      EMAIL_FROM_ADDRESS: noreply@${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  saas-internal:
    driver: bridge
  saas-public:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  caddy-data:
  caddy-config:
  lago-data:
  rustfs-data:
  glitchtip-data:
  uptime-kuma-data:
  prometheus-data:
  loki-data:
  grafana-data:
  matomo-data:
  matomo-db-data:
  mautic-data:
  stalwart-data:
  nocodb-data:
  n8n-data:
  appsmith-data:
  docmost-data:
  ollama-data:
  langflow-data:
  librechat-mongodb-data:
  librechat-meilisearch-data:
  librechat-uploads:
  librechat-logs:
  claude-agent-workspace:
