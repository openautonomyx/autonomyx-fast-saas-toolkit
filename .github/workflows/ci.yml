name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck CLI
        run: pnpm --filter @autonomyx/fast-saas exec tsc --noEmit

      - name: Build CLI
        run: pnpm --filter @autonomyx/fast-saas build

      - name: Typecheck middleware
        run: pnpm --filter @autonomyx/saas-middleware exec tsc --noEmit

      - name: Build middleware
        run: pnpm --filter @autonomyx/saas-middleware build

      - name: Verify CLI runs
        run: node packages/cli/dist/index.js --version

      - name: Verify catalog command
        run: node packages/cli/dist/index.js catalog

  docker-compose-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f packages/starter/docker-compose.yml config --quiet

      - name: Validate override
        run: docker compose -f packages/starter/docker-compose.yml -f packages/starter/docker-compose.override.yml config --quiet

  docs-links:
    name: Check Documentation Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for broken internal links
        run: |
          errors=0
          for file in docs/*.md docs/**/*.md; do
            [ -f "$file" ] || continue
            # Extract markdown links to local files
            grep -oP '\[.*?\]\((?!http)(.*?)\)' "$file" | grep -oP '\(.*?\)' | tr -d '()' | while read -r link; do
              target="docs/$link"
              if [ ! -f "$target" ] && [ ! -f "docs/$(dirname "$file" | sed 's|docs/||')/$link" ]; then
                echo "::warning file=$file::Broken link: $link"
                errors=$((errors + 1))
              fi
            done
          done
          echo "Link check complete"
